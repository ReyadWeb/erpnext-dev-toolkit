name: Release validation

on:
  push:
    branches: [ main, beta ]
  pull_request:
    branches: [ main ]
  # Callable from release.yml so a release is GATED on the same lint/validate/
  # bundle checks. Not triggered directly on tags anymore (release.yml invokes it).
  workflow_call: {}

# Least privilege: this job only reads the tree; it never needs write scopes.
permissions:
  contents: read

# NOTE: No workflow concurrency group. cancel-in-progress previously aborted
# shellcheck mid-run on tag releases and main pushes (v1.17.7 publish failed
# with "The operation was canceled" on the shellcheck step).

jobs:
  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install shellcheck
        # Prefer the upstream static binary (faster/more consistent than apt).
        run: |
          set -euo pipefail
          sc_ver="v0.10.0"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${sc_ver}/shellcheck-${sc_ver}.linux.x86_64.tar.xz" \
            | sudo tar -xJ -C /usr/local/bin --strip-components=1 "shellcheck-${sc_ver}/shellcheck"
          shellcheck --version
          command -v shellcheck

      - name: Run shellcheck
        run: scripts/run-shellcheck.sh

      - name: Validate release tree
        # shellcheck already ran above; validate-release would otherwise re-run it.
        env:
          SKIP_SHELLCHECK: "1"
        run: scripts/validate-release.sh

      - name: Bundle installs from a clean extract (quickstart path)
        # Guards the documented download-and-run flow: the modular toolkit needs
        # the whole lib/ tree, so a bundle missing any module must fail here
        # rather than on a user's VM.
        run: |
          set -euo pipefail
          scripts/build-release-bundle.sh
          ver="v$(grep -E '^SCRIPT_VERSION=' erpnext-dev.sh | head -n1 | cut -d'"' -f2)"
          workdir="$(mktemp -d)"
          tar -C "$workdir" -xzf "dist/erpnext-dev-${ver}.tar.gz"
          cd "${workdir}/erpnext-dev-${ver}"
          sha256sum -c SHA256SUMS
          ./erpnext-dev.sh version
          # Capture then grep — never pipe into grep -q under pipefail (SIGPIPE/141).
          ./erpnext-dev.sh verify-toolkit >/tmp/erpnext-dev-vt-positive.$$ 2>&1
          grep -qi "active match.*OK" /tmp/erpnext-dev-vt-positive.$$ || {
            cat /tmp/erpnext-dev-vt-positive.$$
            rm -f /tmp/erpnext-dev-vt-positive.$$
            exit 1
          }
          rm -f /tmp/erpnext-dev-vt-positive.$$
          # Negative: tampering any module must fail whole-tree verify-toolkit.
          cp -a lib/common.sh lib/common.sh.bak
          printf '\n# tamper-fixture\n' >> lib/common.sh
          if ./erpnext-dev.sh verify-toolkit >/tmp/erpnext-dev-vt-tamper.$$ 2>&1; then
            mv lib/common.sh.bak lib/common.sh
            cat /tmp/erpnext-dev-vt-tamper.$$
            rm -f /tmp/erpnext-dev-vt-tamper.$$
            exit 1
          fi
          grep -qi "FAIL" /tmp/erpnext-dev-vt-tamper.$$ || {
            mv lib/common.sh.bak lib/common.sh
            cat /tmp/erpnext-dev-vt-tamper.$$
            rm -f /tmp/erpnext-dev-vt-tamper.$$
            exit 1
          }
          mv lib/common.sh.bak lib/common.sh
          rm -f /tmp/erpnext-dev-vt-tamper.$$
          ./erpnext-dev.sh --help >/dev/null
          echo "Quickstart bundle path OK."

  atomic-update-smoke:
    name: Atomic update + rollback smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Hermetic update-toolkit / toolkit-rollback smoke
        run: |
          set -euo pipefail
          chmod +x scripts/test-atomic-update.sh
          sudo -E scripts/test-atomic-update.sh
