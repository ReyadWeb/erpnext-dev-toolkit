name: Release validation

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# Least privilege: this job only reads the tree; it never needs write scopes.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: scripts/run-shellcheck.sh

      - name: Validate release tree
        run: scripts/validate-release.sh

      - name: Bundle installs from a clean extract (quickstart path)
        # Guards the documented download-and-run flow: the modular toolkit needs
        # the whole lib/ tree, so a bundle missing any module must fail here
        # rather than on a user's VM.
        run: |
          set -euo pipefail
          scripts/build-release-bundle.sh
          ver="v$(grep -E '^SCRIPT_VERSION=' erpnext-dev.sh | head -n1 | cut -d'"' -f2)"
          workdir="$(mktemp -d)"
          tar -C "$workdir" -xzf "dist/erpnext-dev-${ver}.tar.gz"
          cd "${workdir}/erpnext-dev-${ver}"
          sha256sum -c SHA256SUMS
          ./erpnext-dev.sh version
          ./erpnext-dev.sh verify-toolkit | grep -qi "active match.*OK"
          ./erpnext-dev.sh --help >/dev/null
          echo "Quickstart bundle path OK."
