name: Release (gate, sign & publish)

# On every v* tag, run a single gated pipeline:
#   validate     -> lint + validate-release + bundle quickstart (reuses ci.yml)
#   integration  -> real install + backup/restore + production conversion (reuses integration.yml)
#   publish      -> sign SHA256SUMS (MANDATORY for stable tags) and publish the release
#
# publish `needs: [validate, integration]`, so a release is NEVER published unless
# both the static gate and the full disposable-VM integration run succeed first.
#
# Signing policy:
#   - Stable tags (vX.Y.Z)            -> signing is REQUIRED; the job fails if the
#                                        GPG key is missing or signing/verify fails.
#   - Pre-release tags (vX.Y.Z-...)   -> may publish unsigned (escape hatch, e.g.
#                                        v1.6.0-unsigned for an emergency build).
# See SECURITY.md ("Verifying release signatures").

on:
  push:
    tags:
      - "v*"

# Workflow-level ceiling. The reused validate/integration workflows self-limit to
# `contents: read`; only the publish job below uses write (to create the release).
permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  integration:
    needs: validate
    uses: ./.github/workflows/integration.yml

  publish:
    name: Sign and publish ${{ github.ref_name }}
    needs: [validate, integration]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate release tree
        env:
          RELEASE_STRICT: "1"
        run: scripts/validate-release.sh

      - name: Confirm tag matches SCRIPT_VERSION
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          ver="v$(grep -E '^SCRIPT_VERSION=' erpnext-dev.sh | head -n 1 | cut -d'"' -f2)"
          echo "tag=${tag} script_version=${ver}"
          if [[ "$tag" != "$ver" ]]; then
            echo "::error::Tag ${tag} does not match SCRIPT_VERSION ${ver}."
            exit 1
          fi

      - name: Sign SHA256SUMS (mandatory for stable tags)
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          # A stable release tag is exactly vMAJOR.MINOR.PATCH (no pre-release suffix).
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            stable=1
          else
            stable=0
          fi

          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            if [[ "$stable" -eq 1 ]]; then
              echo "::error::GPG_PRIVATE_KEY is not set. Stable releases MUST be signed."
              echo "Configure the signing key (see SECURITY.md), or cut an unsigned emergency"
              echo "build using a pre-release tag such as ${tag}-unsigned."
              exit 1
            fi
            echo "::warning::No signing key; publishing pre-release ${tag} UNSIGNED (escape hatch)."
            exit 0
          fi

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          keyid="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          [[ -n "$keyid" ]] || { echo "::error::No secret key found after import."; exit 1; }

          sign_args=(--batch --yes --pinentry-mode loopback --local-user "$keyid"
                     --armor --detach-sign --output SHA256SUMS.asc)
          if [[ -n "${GPG_PASSPHRASE:-}" ]]; then
            sign_args=(--passphrase "$GPG_PASSPHRASE" "${sign_args[@]}")
          fi
          gpg "${sign_args[@]}" SHA256SUMS
          gpg --verify SHA256SUMS.asc SHA256SUMS
          echo "Signed SHA256SUMS with key ${keyid}."

      - name: Build release bundle
        # Runs after signing so the tarball includes SHA256SUMS.asc, letting
        # `erpnext-dev verify-signature` (and atomic update-toolkit) verify offline.
        run: scripts/build-release-bundle.sh

      - name: Verify bundle installs from a clean extract
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          workdir="$(mktemp -d)"
          tar -C "$workdir" -xzf "dist/erpnext-dev-${tag}.tar.gz"
          cd "${workdir}/erpnext-dev-${tag}"
          sha256sum -c SHA256SUMS
          ./erpnext-dev.sh version
          ./erpnext-dev.sh verify-toolkit | grep -qi "active match.*OK"
          echo "Bundle is self-contained and verifies from a clean extract."

      - name: Publish GitHub release
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          assets=(SHA256SUMS erpnext-dev.sh RELEASE-MANIFEST.txt "dist/erpnext-dev-${tag}.tar.gz")
          [[ -f SHA256SUMS.asc ]] && assets+=(SHA256SUMS.asc)

          prerelease_flag=""
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease_flag="--prerelease"
          fi

          notes="Automated release for ${GITHUB_REF_NAME}.

          Install (self-contained bundle — includes all lib/ modules):
          \`\`\`
          curl -fsSLO https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/erpnext-dev-${GITHUB_REF_NAME}.tar.gz
          tar -xzf erpnext-dev-${GITHUB_REF_NAME}.tar.gz && cd erpnext-dev-${GITHUB_REF_NAME}
          sha256sum -c SHA256SUMS
          sudo ./erpnext-dev.sh local-dev-quickstart   # or public-vm-guided-setup
          \`\`\`

          Stronger (authenticity): run \`sudo ./erpnext-dev.sh verify-signature\` from the extracted
          bundle (bundled key + pinned fingerprint), or \`gpg --verify SHA256SUMS.asc SHA256SUMS\`.
          See SECURITY.md for the pinned key fingerprint."

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            # shellcheck disable=SC2086
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" --notes "$notes" $prerelease_flag
          fi
