name: Integration (disposable VM)

# Phase D integration testing.
#
# This workflow performs a REAL, non-interactive ERPNext install on an
# ephemeral GitHub-hosted runner (used as a disposable VM) and runs a
# post-install smoke check. It is intentionally NOT run on pull requests
# or ordinary pushes: the fast lint/validate gate lives in ci.yml. A full
# install takes tens of minutes and depends on upstream Frappe/ERPNext
# repositories, so it runs on demand, weekly, and on release tags.

on:
  workflow_dispatch:
    inputs:
      site_name:
        description: "ERPNext site name to install"
        default: "erp.test"
        required: false
      run_experimental_os:
        description: "Also run ubuntu-26.04 canary (experimental; non-blocking)"
        type: boolean
        default: true
        required: false
  schedule:
    # Mondays 06:00 UTC. Catches upstream package/repo drift once a week.
    # Schedule always includes the ubuntu-26.04 canary.
    - cron: "0 6 * * 1"
  # Callable from release.yml so a release is GATED on a real install+restore+
  # production-conversion run. Not triggered directly on tags anymore (release.yml
  # invokes it) to avoid a duplicate multi-hour run per tag.
  # Release calls leave run_experimental_os=false so tag checks stay all-green;
  # ubuntu-26.04 is canary-only (schedule / manual dispatch) until its asset gate
  # is stable enough to become a hard gate.
  workflow_call:
    inputs:
      site_name:
        description: "ERPNext site name to install"
        type: string
        default: "erp.test"
        required: false
      run_experimental_os:
        description: "Also run ubuntu-26.04 canary (leave false for release gates)"
        type: boolean
        default: false
        required: false

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-matrix:
    name: Resolve OS matrix
    runs-on: ubuntu-24.04
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - name: Build matrix include JSON
        id: set
        run: |
          set -euo pipefail
          # Mandatory release-gating leg always present.
          include='[{"os":"ubuntu-24.04","experimental":false}]'
          run_exp="${{ inputs.run_experimental_os }}"
          # schedule has no boolean input; always exercise the canary.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            run_exp=true
          fi
          if [[ "${run_exp}" == "true" ]]; then
            # Experimental / non-blocking until asset gate is green on canaries.
            include='[{"os":"ubuntu-24.04","experimental":false},{"os":"ubuntu-26.04","experimental":true}]'
          fi
          echo "include=${include}" >> "$GITHUB_OUTPUT"
          echo "event=${{ github.event_name }} run_experimental_os=${run_exp}"
          echo "matrix=${include}"

  install-smoke:
    name: Install + smoke (${{ matrix.os }})
    needs: resolve-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    # ubuntu-26.04 is canary-only (schedule / workflow_dispatch, or explicit
    # run_experimental_os on workflow_call). When present it stays continue-on-error
    # so a preview flake never blocks. Tag releases omit it so GitHub checks stay
    # all-green; Ubuntu 24.04 remains the mandatory native gate.
    #
    # Ubuntu 26.04 gotcha (fixed v1.9.4+): sudo-rs ignores `sudo -E` and
    # readlink -f on a relative ./erpnext-dev.sh can return empty under some
    # invoke paths. install_self_for_reuse now falls back to ERPNEXT_DEV_ENTRY_SCRIPT
    # and an absolute-path resolve so /opt/erpnext-dev is always populated.
    # Integration passes CHECKSUM_FILE via `sudo env` (not sudo -E) for the same reason.
    # Also: never pipe verify-toolkit into `grep -q` under pipefail — SIGPIPE/141.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.include) }}
    env:
      # erp.test keeps parity with the toolkit default; dispatch/call can override.
      SITE_NAME: ${{ inputs.site_name || 'erp.test' }}
      # Hosted runners expose well under the 30 GB preflight minimum, so the
      # blocking disk gate must be overridden for CI. Real VMs should not.
      ERPNEXT_ALLOW_UNSAFE_INSTALL: "true"
      # Never let the installer grow the runner's root disk.
      AUTO_EXPAND_ROOT: "false"
      # Start the service so the smoke step can probe it; no boot autostart needed.
      AUTO_START: "true"
      ENABLE_AUTOSTART: "false"
      DEPLOYMENT_MODE: "development"
      DEBIAN_FRONTEND: noninteractive
      # GitHub-hosted runners pre-set NVM_DIR, which masked a real fresh-VM bug
      # (nvm installing under XDG_CONFIG_HOME instead of $HOME/.nvm). Blank it so
      # the integration install mirrors a genuinely fresh machine.
      NVM_DIR: ""
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Report runner capacity
        run: |
          echo "== OS =="; . /etc/os-release && echo "$PRETTY_NAME"
          echo "== CPU =="; nproc
          echo "== Memory =="; free -h
          echo "== Disk =="; df -h /

      - name: Free up disk space
        run: |
          # ERPNext (bench + node_modules + apps) needs several GB; hosted runners
          # ship with large toolchains we do not use. Reclaim space best-effort.
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Verify release checksums
        run: sha256sum -c SHA256SUMS

      - name: Install preflight (read-only)
        run: sudo -E ./erpnext-dev.sh install-preflight || true

      - name: Install ERPNext (non-interactive)
        run: sudo -E ./erpnext-dev.sh -y install

      - name: Collect install failure diagnostics
        if: failure()
        run: |
          set +e
          BENCH_DIR="/home/frappe/frappe/frappe-bench"
          echo "===== toolkit asset checklist ====="
          sudo -E ./erpnext-dev.sh frappe-asset-checklist || true
          echo "===== sites/assets/assets.json ====="
          sudo cat "${BENCH_DIR}/sites/assets/assets.json" 2>/dev/null || echo "assets.json missing"
          echo "===== hashed CSS/JS files on disk ====="
          sudo find "${BENCH_DIR}/sites/assets/frappe/dist/css" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true
          sudo find "${BENCH_DIR}/sites/assets/erpnext/dist/css" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true
          sudo find "${BENCH_DIR}/sites/assets/frappe/dist/js" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true
          echo "===== redis/site config ====="
          sudo cat "${BENCH_DIR}/sites/common_site_config.json" 2>/dev/null || true
          echo "===== service tail ====="
          sudo systemctl status erpnext-dev.service --no-pager -l 2>/dev/null || true
          sudo journalctl -u erpnext-dev.service --no-pager -n 200 2>/dev/null || true

      - name: Assert stable toolkit at /opt (install contract)
        run: |
          set -euo pipefail
          # install_self_for_reuse must copy the running tree to /opt so follow-up
          # commands and verify-toolkit exercise the installed copy, not the checkout.
          if [[ ! -f /opt/erpnext-dev/erpnext-dev.sh ]]; then
            echo "::error::Expected /opt/erpnext-dev/erpnext-dev.sh after install (see install_self_for_reuse / Ubuntu 26.04 sudo-rs note in TESTING.md)"
            sudo ./erpnext-dev.sh where-installed || true
            ls -la /opt/erpnext-dev/ 2>/dev/null || echo "/opt/erpnext-dev missing"
            ls -la /usr/local/bin/erpnext-dev 2>/dev/null || true
            exit 1
          fi
          test -f /opt/erpnext-dev/lib/common.sh
          echo "Stable toolkit present: $(readlink -f /opt/erpnext-dev/erpnext-dev.sh)"

      - name: verify-toolkit integrity (positive and tamper negative)
        run: |
          set -euo pipefail
          # Exercise the installed toolkit at /opt, not the CI checkout copy.
          installed="$(readlink -f /opt/erpnext-dev/erpnext-dev.sh 2>/dev/null || true)"
          [[ -n "$installed" && -f "$installed" ]] || {
            echo "::error::installed toolkit not found at /opt/erpnext-dev/erpnext-dev.sh"
            exit 1
          }
          lib="$(dirname "$installed")/lib/common.sh"
          [[ -f "$lib" ]] || { echo "::error::installed lib/common.sh not found at ${lib}"; exit 1; }

          checksum="${GITHUB_WORKSPACE}/SHA256SUMS"
          [[ -f "$checksum" ]] || checksum="./SHA256SUMS"

          cd /tmp
          # Pass CHECKSUM_FILE via `sudo env` rather than `sudo -E`: Ubuntu 26.04
          # ships sudo-rs, which ignores -E and would drop the variable, breaking
          # verification. `sudo env VAR=val` works on both classic sudo and sudo-rs.
          #
          # Capture to a file, then grep. Do NOT pipe into `grep -q`: with
          # `set -o pipefail`, quiet grep exits as soon as it matches and closes
          # the pipe, so verify-toolkit gets SIGPIPE (exit 141). That race is
          # reliable on Ubuntu 26.04 / sudo-rs and intermittent elsewhere.
          sudo env CHECKSUM_FILE="$checksum" erpnext-dev verify-toolkit >/tmp/erpnext-dev-vt-positive.out 2>&1
          if ! grep -qi "active match.*OK" /tmp/erpnext-dev-vt-positive.out; then
            echo "::error::verify-toolkit positive check failed (no Active match OK)"
            cat /tmp/erpnext-dev-vt-positive.out
            exit 1
          fi

          sudo cp -a "$lib" /tmp/erpnext-dev-common.sh.bak
          printf '\n# tamper-fixture\n' | sudo tee -a "$lib" >/dev/null
          if sudo env CHECKSUM_FILE="$checksum" erpnext-dev verify-toolkit >/tmp/erpnext-dev-vt-tamper.out 2>&1; then
            echo "::error::verify-toolkit passed after tampering ${lib}"
            sudo mv /tmp/erpnext-dev-common.sh.bak "$lib"
            exit 1
          fi
          grep -qi "FAIL" /tmp/erpnext-dev-vt-tamper.out || {
            cat /tmp/erpnext-dev-vt-tamper.out
            sudo mv /tmp/erpnext-dev-common.sh.bak "$lib"
            exit 1
          }
          sudo mv /tmp/erpnext-dev-common.sh.bak "$lib"
          echo "verify-toolkit tamper negative passed (installed toolkit at ${installed})."

      - name: Doctor JSON smoke assertions
        run: |
          set -uo pipefail
          sudo -E ./erpnext-dev.sh doctor --json > doctor.out 2> doctor.err || true
          python3 - <<'PY'
          import json, re, sys
          raw = open('doctor.out', encoding='utf-8', errors='replace').read()
          match = re.search(r'\{.*\}\s*$', raw, re.S)
          if not match:
              sys.stderr.write("No JSON object found in doctor output. Tail:\n")
              sys.stderr.write(raw[-2000:] + "\n")
              sys.exit(1)
          data = json.loads(match.group(0))
          ctx = data.get('context', {})
          print("install_state:", ctx.get('install_state'))
          print("runtime_state:", ctx.get('runtime_state'))
          print("service_state:", ctx.get('service_state'))
          fails = [c for c in data.get('checks', []) if c.get('status') == 'FAIL']
          for c in fails:
              print("FAIL:", c.get('name'), '-', c.get('detail'))
          if ctx.get('install_state') != 'Installed':
              sys.stderr.write("Expected install_state=Installed\n")
              sys.exit(1)
          print("Doctor smoke passed: install_state=Installed")
          PY

      - name: Site reachability smoke (hard gate)
        run: |
          set -uo pipefail
          # Let the toolkit's own readiness poll run first (best-effort; its window
          # is short). The loop below is the actual gate and waits much longer to
          # tolerate first-boot asset builds and migrations.
          sudo -E ./erpnext-dev.sh wait-ready || true

          # Frappe resolves the target site from the Host header; a bare localhost
          # request can hit the wrong or a non-existent site. Pin it to SITE_NAME.
          probe() {
            curl -s -o /dev/null -w '%{http_code}' \
              -H "Host: ${SITE_NAME}" \
              "http://127.0.0.1:8000/api/method/ping" 2>/dev/null || true
          }

          attempts=36   # 36 x 10s = up to 6 minutes
          for i in $(seq 1 "$attempts"); do
            code="$(probe)"
            echo "attempt ${i}/${attempts}: http=${code}"
            case "$code" in
              200|401|403) echo "Site is reachable on :8000 (site=${SITE_NAME}, http=${code})"; exit 0 ;;
            esac
            sleep 10
          done

          echo "::error::Site not reachable on :8000 for site ${SITE_NAME} after $((attempts * 10))s."
          echo "===== diagnostics ====="
          sudo systemctl status erpnext-dev.service --no-pager -l 2>/dev/null || true
          sudo journalctl -u erpnext-dev.service --no-pager -n 200 2>/dev/null || true
          sudo ss -ltnp 2>/dev/null | grep -E ':8000|:9000' || echo "nothing listening on :8000/:9000"
          curl -sv -H "Host: ${SITE_NAME}" "http://127.0.0.1:8000/api/method/ping" 2>&1 | head -40 || true
          exit 1

      - name: Browser asset consistency (hard gate)
        run: |
          set -euo pipefail
          # Discover every local CSS/JS required by /login and assert zero 404s.
          # wait-ready requires the same complete asset manifest to pass repeatedly;
          # verify-frontend-assets then performs an independent fresh probe.
          asset_gate_rc=0
          sudo -E ./erpnext-dev.sh wait-ready || asset_gate_rc=1
          sudo -E ./erpnext-dev.sh verify-frontend-assets || asset_gate_rc=1

          if [[ "$asset_gate_rc" -eq 0 ]]; then
            echo "Browser asset consistency passed (stable wait-ready + independent verify-frontend-assets)."
            exit 0
          fi

          echo "::error::Browser asset consistency failed; collecting frontend diagnostics."
          echo "===== toolkit asset checklist ====="
          sudo -E ./erpnext-dev.sh frappe-asset-checklist || true

          BENCH_DIR="/home/frappe/frappe/frappe-bench"
          echo "===== sites/assets/assets.json ====="
          sudo cat "${BENCH_DIR}/sites/assets/assets.json" 2>/dev/null || echo "assets.json missing"

          echo "===== hashed CSS/JS files on disk ====="
          sudo find "${BENCH_DIR}/sites/assets/frappe/dist/css" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true
          sudo find "${BENCH_DIR}/sites/assets/erpnext/dist/css" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true
          sudo find "${BENCH_DIR}/sites/assets/frappe/dist/js" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true

          echo "===== five consecutive /login asset manifests ====="
          for i in 1 2 3 4 5; do
            echo "--- manifest ${i} ---"
            curl -sS -D - -H "Host: ${SITE_NAME}" "http://127.0.0.1:8000/login" 2>/dev/null \
              | grep -oE '/assets/[^>"'"'"',[:space:]]+\.(css|js)' \
              | sed 's/[?#].*$//' \
              | sort -u || true
            sleep 1
          done

          echo "===== redis cache endpoints ====="
          sudo cat "${BENCH_DIR}/sites/common_site_config.json" 2>/dev/null || true
          echo "===== service tail ====="
          sudo systemctl status erpnext-dev.service --no-pager -l 2>/dev/null || true
          sudo journalctl -u erpnext-dev.service --no-pager -n 200 2>/dev/null || true
          exit 1

      - name: Backup and restore round trip
        run: |
          set -uo pipefail
          echo "== Create backup set (database + files) =="
          sudo -E ./erpnext-dev.sh backup-files

          echo "== Backup status =="
          sudo -E ./erpnext-dev.sh backup-status || true

          echo "== Verify latest backup set =="
          sudo -E ./erpnext-dev.sh backup-verify

          echo "== Restore the latest complete set (non-interactive) =="
          # restore-full auto-selects the latest complete set under -y and
          # auto-detects the DB admin credential from the toolkit credentials
          # file; only the destructive confirmation reads stdin, so we pipe the
          # required "RESTORE" token. This exercises the real restore code path,
          # including the pre-restore emergency backup and post-restore migrate.
          echo RESTORE | sudo -E ./erpnext-dev.sh -y restore-full

      - name: Post-restore health check (hard gate)
        run: |
          set -uo pipefail
          sudo -E ./erpnext-dev.sh wait-ready || true

          # doctor's install_state=Installed requires the site dir, apps.txt, and
          # apps/erpnext to be present, so a healthy verdict here proves the
          # database and site survived the destructive restore intact.
          sudo -E ./erpnext-dev.sh doctor --json > doctor-post-restore.out 2> doctor-post-restore.err || true
          python3 - <<'PY'
          import json, re, sys
          raw = open('doctor-post-restore.out', encoding='utf-8', errors='replace').read()
          match = re.search(r'\{.*\}\s*$', raw, re.S)
          if not match:
              sys.stderr.write("No JSON in post-restore doctor output. Tail:\n" + raw[-2000:] + "\n")
              sys.exit(1)
          data = json.loads(match.group(0))
          state = data.get('context', {}).get('install_state')
          print("post-restore install_state:", state)
          if state != 'Installed':
              sys.stderr.write("Expected install_state=Installed after restore\n")
              sys.exit(1)
          print("Post-restore doctor smoke passed.")
          PY

          for i in $(seq 1 18); do
            code="$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${SITE_NAME}" http://127.0.0.1:8000/api/method/ping || true)"
            echo "post-restore attempt ${i}/18: http=${code}"
            case "$code" in
              200|401|403) echo "Site reachable after restore (http=${code})"; exit 0 ;;
            esac
            sleep 10
          done
          echo "::error::Site not reachable on :8000 after restore."
          sudo systemctl status erpnext-dev.service --no-pager -l 2>/dev/null || true
          sudo journalctl -u erpnext-dev.service --no-pager -n 200 2>/dev/null || true
          exit 1

      - name: Convert to production runtime and assert (hard gate)
        run: |
          set -uo pipefail
          echo "== Switch to supervisor-managed production runtime =="
          sudo -E ./erpnext-dev.sh -y setup-production-runtime

          echo "== Runtime status =="
          sudo -E ./erpnext-dev.sh production-runtime-status || true

          echo "== supervisorctl status =="
          sudo supervisorctl status || true

          # 1. The dev bench-start service must be disabled in production.
          if sudo systemctl is-active --quiet erpnext-dev.service; then
            echo "::error::erpnext-dev.service (bench start) is still active in production mode."
            exit 1
          fi

          # 2. No 'bench start' process may be running (no dev server/watcher/debugger).
          if pgrep -af "bench start" ; then
            echo "::error::A 'bench start' process is running in production mode."
            exit 1
          fi

          # 3. Supervisor must be managing a running program group.
          if ! sudo supervisorctl status | grep -q "RUNNING"; then
            echo "::error::No supervisor programs are RUNNING."
            sudo supervisorctl status || true
            exit 1
          fi

          # 4. gunicorn must actually serve HTTP on :8000.
          ok=0
          for i in $(seq 1 24); do
            code="$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${SITE_NAME}" http://127.0.0.1:8000/api/method/ping || true)"
            echo "prod attempt ${i}/24: http=${code}"
            case "$code" in
              200|401|403) echo "Production runtime serving on :8000 (http=${code})"; ok=1; break ;;
            esac
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Production runtime not serving on :8000."
            sudo supervisorctl status || true
            sudo ss -ltnp 2>/dev/null | grep -E ':8000|:9000' || echo "nothing on :8000/:9000"
            exit 1
          fi

          # 5. socket.io must accept TCP on :9000. Use nc (same as toolkit
          # port_listens) with retries — one-shot `ss -ltnp` is flaky on
          # ubuntu-26.04/sudo-rs even when supervisor node-socketio is RUNNING.
          ok_sock=0
          for i in $(seq 1 12); do
            if nc -z 127.0.0.1 9000 2>/dev/null; then
              echo "socket.io accepting on :9000 (attempt ${i})"
              ok_sock=1
              break
            fi
            echo "socket.io wait ${i}/12: :9000 not accepting yet"
            sleep 2
          done
          if [ "$ok_sock" -ne 1 ]; then
            echo "::error::socket.io not listening on :9000"
            sudo supervisorctl status || true
            nc -zv 127.0.0.1 9000 2>&1 || true
            sudo ss -ltnp 2>/dev/null | grep -E ':8000|:9000' || echo "nothing on :8000/:9000 (ss)"
            exit 1
          fi

          echo "Production runtime conversion verified: supervisor up, gunicorn serving, no bench start."

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          cp -v doctor.out doctor.err doctor-post-restore.out doctor-post-restore.err artifacts/ 2>/dev/null || true
          sudo supervisorctl status > artifacts/supervisorctl-status.txt 2>&1 || true
          sudo -E ./erpnext-dev.sh list-backups > artifacts/list-backups.txt 2>&1 || true
          sudo cp -rv /var/log/erpnext-dev artifacts/toolkit-logs 2>/dev/null || true
          sudo journalctl -u erpnext-dev.service --no-pager > artifacts/service-journal.txt 2>/dev/null || true
          sudo chown -R "$USER" artifacts 2>/dev/null || true
          df -h / | tee artifacts/disk-after.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-${{ matrix.os }}
          path: artifacts/
          if-no-files-found: ignore

  docker-install-smoke:
    name: Docker engine install + smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    # RELEASE-GATING (P8): the containerized development stack (pwd.yml) is proven
    # at parity, so this leg now blocks a release on failure just like the native
    # install-smoke leg. It exercises install -> serve -> engine-status/doctor ->
    # durable backup + verify (P3) -> restore rehearsal (P3). The heavier
    # production compose.yaml path is exercised by the separate
    # docker-production-smoke leg, which is now also a hard release gate.
    env:
      SITE_NAME: "erp.test"
      # Force the Docker deployment engine (non-interactive install would default
      # to native). The entry script reads this and routes to docker_guided_install.
      DEPLOYMENT_ENGINE: "docker"
      DOCKER_PUBLISH_PORT: "8080"
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Report runner + Docker capacity
        run: |
          echo "== OS =="; . /etc/os-release && echo "$PRETTY_NAME"
          echo "== Docker =="; docker version || true
          echo "== Compose =="; docker compose version || true
          echo "== Disk =="; df -h /

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup 2>/dev/null || true
          df -h /

      - name: Verify release checksums
        run: sha256sum -c SHA256SUMS

      - name: Engine-selection unit test (hermetic)
        run: ./scripts/test-engine-select.sh

      - name: Docker preflight (read-only)
        run: sudo -E env DEPLOYMENT_ENGINE=docker ./erpnext-dev.sh install-preflight || true

      - name: Install ERPNext via Docker engine (non-interactive)
        run: sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_PUBLISH_PORT=8080 SITE_NAME=erp.test ./erpnext-dev.sh -y install

      - name: Smoke test published port
        run: |
          set -euo pipefail
          ok=0
          # Send the site Host header to match how Frappe resolves the target site
          # (mirrors the native smoke leg). The Docker frontend also pins the site
          # via FRAPPE_SITE_NAME_HEADER, so this is defensive alignment.
          for i in $(seq 1 60); do
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 -H "Host: ${SITE_NAME}" http://localhost:8080/api/method/ping || true)"
            echo "attempt ${i}/60: http=${code}"
            case "$code" in
              200|401|403) echo "ERPNext (Docker) serving on :8080 (http=${code})"; ok=1; break ;;
            esac
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Docker ERPNext not serving on :8080."
            sudo -E env DEPLOYMENT_ENGINE=docker ./erpnext-dev.sh status || true
            sudo -E env DEPLOYMENT_ENGINE=docker ./erpnext-dev.sh logs || true
            exit 1
          fi

      - name: Engine status + doctor smoke
        run: |
          sudo -E env DEPLOYMENT_ENGINE=docker ./erpnext-dev.sh engine-status || true
          sudo -E env DEPLOYMENT_ENGINE=docker ./erpnext-dev.sh doctor --plain || true

      - name: Durable backup + verify (P3, hard gate)
        run: |
          set -euo pipefail
          sudo -E env DEPLOYMENT_ENGINE=docker SITE_NAME=erp.test ./erpnext-dev.sh -y backup-files
          # backup-verify exits non-zero if the exported host artifact is missing
          # gzip/tar/checksum integrity, so this is a real assertion.
          sudo -E env DEPLOYMENT_ENGINE=docker SITE_NAME=erp.test ./erpnext-dev.sh backup-verify

      - name: Restore rehearsal (P3, hard gate)
        run: |
          set -euo pipefail
          # Restores the exported artifact into a throwaway site on the same image,
          # confirms erpnext is present, then drops it. Non-zero on failure.
          sudo -E env DEPLOYMENT_ENGINE=docker SITE_NAME=erp.test ./erpnext-dev.sh -y docker-restore-rehearsal
          sudo -E env DEPLOYMENT_ENGINE=docker SITE_NAME=erp.test ./erpnext-dev.sh docker-restore-evidence || true

      - name: Collect Docker diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          sudo -E env DEPLOYMENT_ENGINE=docker ./erpnext-dev.sh status > artifacts/docker-status.txt 2>&1 || true
          sudo docker compose -p erpnext-dev -f /opt/erpnext-dev/docker/frappe_docker/pwd.yml -f /opt/erpnext-dev/docker/erpnext-dev.override.yml --env-file /opt/erpnext-dev/docker/erpnext-dev.env logs --tail 200 > artifacts/docker-compose-logs.txt 2>&1 || true
          sudo chown -R "$USER" artifacts 2>/dev/null || true

      - name: Upload Docker diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-docker
          path: artifacts/
          if-no-files-found: ignore

  docker-production-smoke:
    name: Docker production compose + smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    # RELEASE-GATING (P8 complete): exercises the PRODUCTION compose.yaml path
    # (P1) end to end -- explicit site creation, HTTP (noproxy) exposure guardrail
    # (P5), durable backup + verify and restore rehearsal (P3). Promoted from the
    # non-blocking staged leg to a hard release gate after the production DR chain
    # was proven green, so a production regression now blocks a release just like
    # the native install-smoke and Docker dev legs.
    env:
      SITE_NAME: "erp.test"
      DEPLOYMENT_ENGINE: "docker"
      DOCKER_MODE: "production"
      DOCKER_PUBLISH_PORT: "8081"
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Report runner + Docker capacity
        run: |
          echo "== OS =="; . /etc/os-release && echo "$PRETTY_NAME"
          echo "== Docker =="; docker version || true
          echo "== Compose =="; docker compose version || true
          echo "== Disk =="; df -h /

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup 2>/dev/null || true
          df -h /

      - name: Verify release checksums
        run: sha256sum -c SHA256SUMS

      - name: Install ERPNext via Docker PRODUCTION setup (non-interactive)
        run: sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production DOCKER_PUBLISH_PORT=8081 SITE_NAME=erp.test ./erpnext-dev.sh -y docker-production-setup

      - name: Smoke test published port
        run: |
          set -euo pipefail
          ok=0
          for i in $(seq 1 60); do
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 -H "Host: ${SITE_NAME}" http://localhost:8081/api/method/ping || true)"
            echo "attempt ${i}/60: http=${code}"
            case "$code" in
              200|401|403) echo "ERPNext (Docker production) serving on :8081 (http=${code})"; ok=1; break ;;
            esac
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Docker production ERPNext not serving on :8081."
            sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh status || true
            sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh logs || true
            exit 1
          fi

      - name: Production exposure guardrail (P5)
        run: sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh docker-production-exposure

      - name: Durable backup + verify (P3)
        run: |
          set -euo pipefail
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production SITE_NAME=erp.test ./erpnext-dev.sh -y backup-files
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production SITE_NAME=erp.test ./erpnext-dev.sh backup-verify

      - name: Restore rehearsal (P3)
        run: |
          set -euo pipefail
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production SITE_NAME=erp.test ./erpnext-dev.sh -y docker-restore-rehearsal

      - name: Engine status + doctor smoke
        run: |
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh engine-status || true
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh doctor --plain || true

      - name: Collect Docker diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh status > artifacts/docker-prod-status.txt 2>&1 || true
          sudo -E env DEPLOYMENT_ENGINE=docker DOCKER_MODE=production ./erpnext-dev.sh logs > artifacts/docker-prod-logs.txt 2>&1 || true
          sudo chown -R "$USER" artifacts 2>/dev/null || true

      - name: Upload Docker production diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-docker-production
          path: artifacts/
          if-no-files-found: ignore
